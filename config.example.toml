# Genesis Configuration
# Run `genesis init` to install this at ~/.genesis/config.toml
#
# No API keys required.
# Both agents authenticate via their own CLIs using your Pro accounts.

[orchestrator]
# The director: plans tasks, assigns workers, reviews results.
# Claude Code is recommended here — it gives the best structured JSON output.
provider = "claude-cli"          # "claude-cli" | "codex-cli"
model = "claude-opus-4-6"        # or alias "opus"

[worker]
# The executor: writes code, docs, tests, configs.
# Codex is recommended here — it can autonomously run commands and write files.
provider = "codex-cli"           # "codex-cli" | "claude-cli"
model = "auto"                   # "auto" = use your account's default model (gpt-5.4)

[claude_cli]
# Requires: Claude Code installed + logged in (`claude login`)
command = "claude"               # auto-detected from PATH
timeout = 300                    # seconds to wait per call

[codex_cli]
# Requires: Codex CLI installed + logged in (`codex login`)
command = "codex"                # auto-detected from PATH
timeout = 600                    # codex tasks take longer (it runs code)
model = "auto"                   # leave as "auto" to use your account default

[chatgpt_browser]
# Only needed if you want to drive ChatGPT via the web UI instead of Codex CLI.
# Requires: pip install playwright && playwright install chromium
enabled = false

[git]
auto_commit = true               # commit after each approved step
auto_push = false                # push after each commit
remote = "origin"
branch = "main"
commit_prefix = "[genesis]"

[memory]
file = "GENESIS_MEMORY.md"       # created in the current working directory
max_context_chars = 6000
auto_append_plan = true
