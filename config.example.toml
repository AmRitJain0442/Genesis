# Genesis Configuration
# Copy to ~/.genesis/config.toml  (or run: genesis init)
#
# No API keys required.
# Claude Code uses your existing Claude Pro/Max account (via `claude login`).
# ChatGPT uses browser automation against your Pro account (optional).

[orchestrator]
# The director: plans tasks, assigns workers, reviews results.
provider = "claude-cli"          # "claude-cli" | "chatgpt-browser"
model = "claude-opus-4-6"        # or alias "opus"

[worker]
# The executors: write code, docs, tests, configs.
provider = "claude-cli"          # "claude-cli" | "chatgpt-browser"
model = "claude-sonnet-4-6"      # or alias "sonnet" (faster, cheaper)

[claude_cli]
# Settings for the Claude Code CLI agent.
# Requires: Claude Code installed + `claude login` completed.
command = "claude"               # auto-detected from PATH
timeout = 300                    # seconds to wait per call

[chatgpt_browser]
# Optional: drive ChatGPT Pro via browser automation (no API key needed).
# Requires: pip install playwright && playwright install chromium
enabled = false
headless = true
profile_dir = ""                 # set to a path to persist your login session
model = "gpt-4o"                 # informational label only

[git]
auto_commit = true               # commit after each approved step
auto_push = false                # push after each commit
remote = "origin"
branch = "main"
commit_prefix = "[genesis]"

[memory]
file = "GENESIS_MEMORY.md"       # in the current working directory
max_context_chars = 6000         # max chars injected into prompts
auto_append_plan = true          # write the task plan to memory at start
