# Genesis Configuration
# Run `genesis init` to install this at ~/.genesis/config.toml
# Or run `genesis add-account` / `add-claude-account` from the REPL to add
# Codex or Claude accounts interactively.
#
# No API keys required.
# Claude Code and Codex both authenticate via OAuth using your Pro accounts.

[orchestrator]
# Claude Code is recommended as orchestrator — best structured JSON reasoning.
# This is the Claude brain's model; a Claude account with model="auto" inherits it.
provider = "claude-cli"
model = "claude-opus-4-8"   # Claude brain = Opus 4.8 (or alias "opus")

[worker]
# Codex is recommended as worker — autonomous code execution with shell access.
provider = "codex-cli"
model = "auto"              # uses your account's default (currently gpt-5.4)

[claude_cli]
# Requires: Claude Code installed + logged in via `claude auth login`
command = "claude"          # auto-detected from PATH
timeout = 300               # seconds per call

# ── Multiple Claude accounts ───────────────────────────────────────────────
# Add one [[claude_cli.accounts]] block per Claude account.
# Each account uses its own CLAUDE_CONFIG_DIR directory with a separate login
# session, so extra logins never disturb your default ~/.claude account.
# Accounts are automatically registered as workers named by their "name" field.
# Run `genesis add-claude-account` from the REPL to add accounts interactively.
# (Omit the accounts entirely to keep using your single default ~/.claude login.)
#
# [[claude_cli.accounts]]
# name       = "claude-main"     # used as the worker key in Genesis
# config_dir = ""                # empty = default ~/.claude (your current login)
# model      = "auto"            # "auto" = use the [orchestrator]/[worker] model
#
# [[claude_cli.accounts]]
# name       = "claude-pro2"
# config_dir = "C:/Users/amrit/.claude-pro2"   # CLAUDE_CONFIG_DIR for this account
# model      = "auto"

[codex_cli]
# Requires: Codex CLI installed + logged in via `codex login`
command = "codex"           # auto-detected from PATH
timeout = 600               # worker inactivity timeout; active JSONL events reset it

# ── Multiple Codex accounts ────────────────────────────────────────────────
# Add one [[codex_cli.accounts]] block per ChatGPT Pro account.
# Each account uses its own CODEX_HOME directory with a separate login session.
# Accounts are automatically registered as workers named by their "name" field.
# Run `genesis add-account` from the REPL to add accounts interactively.

[[codex_cli.accounts]]
name  = "codex-main"        # used as the worker key in Genesis
home  = ""                  # empty = default ~/.codex (your current login)
model = "auto"              # pin e.g. "gpt-5.6-sol" for the Codex brain
# reasoning = "high"        # model_reasoning_effort: minimal|low|medium|high
# reserve = false            # true = use only after normal Codex accounts exhaust
                            # (the "high" in "gpt-5.6-sol high"); omit for default
#
# The first non-reserve Codex account is also the Codex brain (co-planner /
# reviewer). Reserve accounts remain dormant until normal Codex workers exhaust.

# Uncomment and fill in additional accounts:
# [[codex_cli.accounts]]
# name  = "codex-pro2"
# home  = "C:/Users/amrit/.codex-pro2"   # CODEX_HOME for this account
# model = "auto"
#
# [[codex_cli.accounts]]
# name  = "codex-pro3"
# home  = "C:/Users/amrit/.codex-pro3"
# model = "auto"

[collaboration]
# When two brains are available (a Claude orchestrator AND a Codex orchestrator),
# they debate the task in a brain chatroom and converge on a shared plan before
# any workers start. They debate until both agree; max_rounds is a hard backstop
# after which the Claude brain arbitrates and synthesizes the final plan.
enabled    = true
max_rounds = 2

[dialogue]
# Multi-turn conversation between the directing brain and each worker. The
# worker implements, the brain evaluates and asks for specific revisions, and
# the worker iterates — up to max_turns — before the work goes to the
# independent reviewer. Watch it unfold in the per-step worker room.
enabled   = true
max_turns = 2
fast_path = true          # clean cheap gates go directly to independent review

[failover]
# When an account's CLI reports a rate/usage/quota limit, Genesis marks it
# exhausted and routes the work to another account (same provider first, then
# any). Applies to workers and to brain calls (planning, review, direction).
# The exhausted account is skipped for cooldown_seconds, then retried.
enabled          = true
cooldown_seconds = 900      # 15 minutes

[chatroom]
# A local, observable message bus for agent coordination. When a run starts,
# Genesis prints a localhost link where you can watch the agents communicate
# live (read-only). Nothing is exposed beyond 127.0.0.1.
enabled      = true
host         = "127.0.0.1"
port         = 0            # 0 = pick a free port automatically
persist      = true         # append per-room transcripts under .genesis/state/chatrooms
open_browser = false        # set true to auto-open the viewer on the first run

[chatgpt_browser]
# Only needed if you want to drive ChatGPT via the web UI.
# Requires: pip install playwright && playwright install chromium
enabled = false

[git]
auto_commit = true
auto_push   = false
remote        = "origin"
branch        = "main"
commit_prefix = "[genesis]"

[runtime]
state_db = ""              # empty = ~/.genesis/state/genesis.db
retry_budget = 2           # shared repairs: worker, gates, review, verification, integration
max_parallel_workers = 3   # non-overlapping ready steps use the three normal workers
checkpoint_mode = "always"

[memory]
file              = "GENESIS_MEMORY.md"
max_context_chars = 6000       # total Markdown + Palace memory budget per prompt
auto_append_plan  = true
palace_enabled    = true   # store searchable verbatim memories in SQLite

[verification]
commands = []              # e.g. ["python -m compileall genesis", "python -m unittest discover"]
timeout = 300
require_for_commit = true

[policy]
file = "genesis.policy.toml"
protected_paths = [".git/", ".genesis/state/"]
blocked_commands = ["git reset --hard", "git checkout --", "Remove-Item -Recurse -Force", "rm -rf /"]
allowed_commands = []      # empty = allow all except blocked
